<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="512" cy="512" r="440"/>
    </clipPath>
  </defs>
  <!-- Outer circle with gradient -->
  <circle cx="512" cy="512" r="480" fill="url(#bg)"/>
  <!-- Inner dark circle (the "camera view") -->
  <circle cx="512" cy="512" r="440" fill="#1a1a2e"/>
  <!-- Subtle glow at top -->
  <ellipse cx="512" cy="300" rx="300" ry="200" fill="url(#glow)" clip-path="url(#circle-clip)"/>
  <!-- Stylized person silhouette -->
  <g clip-path="url(#circle-clip)">
    <!-- Head -->
    <circle cx="512" cy="380" r="120" fill="#c4b5fd" opacity="0.9"/>
    <!-- Shoulders/body -->
    <ellipse cx="512" cy="700" rx="220" ry="200" fill="#c4b5fd" opacity="0.9"/>
  </g>
  <!-- Ring highlight -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
</svg>
